name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "sb-backend/**"
      - ".github/workflows/docker-publish.yml"

env:
  REGISTRY: ghcr.io
  # github.repository is "owner/repo-name" — image will be ghcr.io/owner/repo-name/sb-backend
  IMAGE_NAME: ${{ github.repository }}/sb-backend

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    # Required permissions for GHCR push and attestation
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the auto-generated GITHUB_TOKEN
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags + labels) for the image
      # Tags produced:
      #   - ghcr.io/<owner>/<repo>/sb-backend:latest        (on every main push)
      #   - ghcr.io/<owner>/<repo>/sb-backend:main          (branch name)
      #   - ghcr.io/<owner>/<repo>/sb-backend:<short-sha>   (e.g. abc1234)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short

      # Enable BuildKit cache and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push — build context is sb-backend/ (same as compose files)
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./sb-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: reuse layers from the previous push on the same branch
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Attach a signed attestation (SBOM-style provenance) to the image
      - name: Generate image attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
