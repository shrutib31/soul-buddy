name: Backend Unit Tests

on:
  push:
    branches:
      - "**"          # every branch push
    paths:
      - "sb-backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches:
      - main          # PRs targeting main
    paths:
      - "sb-backend/**"
      - ".github/workflows/backend-tests.yml"

defaults:
  run:
    working-directory: sb-backend

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip downloads to speed up subsequent runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('sb-backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # Install CPU-only PyTorch first (saves ~1.3 GB vs default CUDA build)
      - name: Install PyTorch (CPU-only)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      # Install all project + dev dependencies
      - name: Install project dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests (excluding integration)
        env:
          # Dummy values so any env.getenv() calls at import time don't error
          OPENAI_API_KEY: "dummy-key-ci"
          OLLAMA_BASE_URL: "http://localhost:11434"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
          SUPABASE_ANON_KEY: "placeholder-anon-key"
          DATA_DB_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/soulbuddy"
          # Disable encryption in CI — no GCP KMS available; google.cloud.kms is
          # stubbed in conftest.py but keeping this false prevents the KeyManager
          # singleton from initialising with a mocked KMS client between tests.
          ENCRYPTION_ENABLED: "false"
        run: |
          pytest tests/ -m "not integration" \
            --tb=short \
            -v \
            --junitxml=test-results.xml

      # Upload test results so they're visible in the Actions UI even on failure
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: sb-backend/test-results.xml
          retention-days: 7
